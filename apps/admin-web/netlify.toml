# monorepo: 루트에서 build:admin 실행 → apps/admin-web/.next 출력
# publish는 빌드 루트 기준 경로 (packagePath: apps/admin-web 시 repo 루트가 base)
[build]
  command = "npm run build:admin"
  publish = "apps/admin-web/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"
  NEXT_TELEMETRY_DISABLED = "1"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_LANDING_AUDIENCE"
